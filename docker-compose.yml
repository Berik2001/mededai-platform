services:
  # ─── Databases ───────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: med_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-med}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-medpass}
      POSTGRES_DB: ${POSTGRES_DB:-med_platform}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-med} -d ${POSTGRES_DB:-med_platform}"]
      interval: 10s
      timeout: 5s
      retries: 5

  mongo:
    image: mongo:7
    container_name: med_mongo
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USER:-med}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD:-medpass}
      MONGO_INITDB_DATABASE: ${MONGO_DB:-med_content}
    ports:
      - "${MONGO_PORT:-27017}:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── API (NestJS) ────────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: med_api
    restart: unless-stopped
    environment:
      NODE_ENV: production
      API_PORT: 4000
      # Defaults to the bundled postgres container; override DATABASE_URL in .env
      # to point at an external DB (e.g. host Postgres via host.docker.internal).
      DATABASE_URL: ${DATABASE_URL:-postgresql://${POSTGRES_USER:-med}:${POSTGRES_PASSWORD:-medpass}@postgres:5432/${POSTGRES_DB:-med_platform}?schema=public}
      MONGODB_URI: "mongodb://${MONGO_USER:-med}:${MONGO_PASSWORD:-medpass}@mongo:27017/${MONGO_DB:-med_content}?authSource=admin"
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production-use-a-long-random-string}
      JWT_ACCESS_EXPIRES_IN: ${JWT_ACCESS_EXPIRES_IN:-15m}
      JWT_REFRESH_EXPIRES_DAYS: ${JWT_REFRESH_EXPIRES_DAYS:-7}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      GEMINI_MODEL: ${GEMINI_MODEL:-gemini-2.5-flash}
      CORS_ORIGINS: ${CORS_ORIGINS:-https://localhost,https://localhost:3000}
      # Set FORCE_HTTPS=true in production (TLS is terminated at nginx, which
      # forwards X-Forwarded-Proto). Left false so internal healthchecks pass.
      FORCE_HTTPS: ${FORCE_HTTPS:-false}
      AUDIT_ENABLED: ${AUDIT_ENABLED:-true}
      BACKUP_ENABLED: ${BACKUP_ENABLED:-false}
      BACKUP_DIR: /backups
      BACKUP_RETENTION_DAYS: ${BACKUP_RETENTION_DAYS:-7}
      BACKUP_CRON: ${BACKUP_CRON:-0 3 * * *}
      UPLOAD_DIR: /uploads
    # Lets the container reach the host machine's Postgres at host.docker.internal.
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - backups:/backups
      - uploads:/uploads
    depends_on:
      postgres:
        condition: service_healthy
      mongo:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:4000/api/health"]
      interval: 15s
      timeout: 5s
      retries: 10

  # ─── Web (Next.js) ───────────────────────────────────────────────
  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        # Empty → the browser calls "/api" on the same origin (via nginx).
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-}
    container_name: med_web
    restart: unless-stopped
    depends_on:
      - api
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000"]
      interval: 15s
      timeout: 5s
      retries: 10

  # ─── nginx reverse proxy (TLS termination) ───────────────────────
  nginx:
    build:
      context: ./infra/nginx
    container_name: med_nginx
    restart: unless-stopped
    ports:
      - "${HTTP_PORT:-80}:80"
      - "${HTTPS_PORT:-443}:443"
      - "3000:3000"
    depends_on:
      - web
      - api
    volumes:
      - nginx_certs:/etc/nginx/certs

  # ─── Optional admin UIs — `docker compose --profile tools up -d` ──
  adminer:
    image: adminer:latest
    container_name: med_adminer
    restart: unless-stopped
    profiles: ["tools"]
    ports:
      - "8080:8080"
    depends_on:
      - postgres

  mongo-express:
    image: mongo-express:latest
    container_name: med_mongo_express
    restart: unless-stopped
    profiles: ["tools"]
    environment:
      ME_CONFIG_MONGODB_ADMINUSERNAME: ${MONGO_USER:-med}
      ME_CONFIG_MONGODB_ADMINPASSWORD: ${MONGO_PASSWORD:-medpass}
      ME_CONFIG_MONGODB_URL: "mongodb://${MONGO_USER:-med}:${MONGO_PASSWORD:-medpass}@mongo:27017/"
      ME_CONFIG_BASICAUTH: "false"
    ports:
      - "8081:8081"
    depends_on:
      - mongo

volumes:
  postgres_data:
  mongo_data:
  backups:
  uploads:
  nginx_certs:
