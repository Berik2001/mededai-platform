# Reverse proxy: terminates TLS and routes to the web app and API.
# NOTE: we deliberately do NOT use static `upstream` blocks — nginx resolves
# those once at startup and caches the IP, so a rebuilt api/web container (new
# IP) would 502 until nginx restarts. Instead we resolve via Docker's embedded
# DNS at request time using variables in proxy_pass.

# Redirect all plain HTTP to HTTPS.
server {
  listen 80;
  server_name _;
  return 301 https://$host$request_uri;
}

server {
  listen 443 ssl;
  listen 3000 ssl;
  http2 on;
  server_name _;

  ssl_certificate     /etc/nginx/certs/server.crt;
  ssl_certificate_key /etc/nginx/certs/server.key;
  ssl_protocols       TLSv1.2 TLSv1.3;
  ssl_ciphers         HIGH:!aNULL:!MD5;

  # HSTS (the API also sets this via helmet).
  add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

  # Allow image uploads (ECG/radiology) up to 12 MB.
  client_max_body_size 12m;

  # Docker's embedded DNS — re-resolve container IPs at runtime (valid=10s).
  resolver 127.0.0.11 valid=10s ipv6=off;

  # ─── API ───
  location /api/ {
    set $api_target http://api:4000;
    proxy_pass $api_target;
    proxy_http_version 1.1;
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;   # drives the API's HTTPS enforcement
    proxy_set_header Connection        "";
    # Stream Server-Sent Events (Virtual Patient) without buffering.
    proxy_buffering off;
    proxy_read_timeout 3600s;
  }

  # ─── Uploaded media (served by the API, outside the /api prefix) ───
  location /uploads/ {
    set $uploads_target http://api:4000;
    proxy_pass $uploads_target;
    proxy_set_header Host              $host;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  # ─── Web app (Next.js) ───
  location / {
    set $web_target http://web:3000;
    proxy_pass $web_target;
    proxy_http_version 1.1;
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Upgrade           $http_upgrade;   # Next.js HMR / websockets
    proxy_set_header Connection        "upgrade";
  }
}
